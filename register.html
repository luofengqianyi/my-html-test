<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 用户注册</h1>
        <form action="#" method="post">
            
            <div class="form-item">
                <label for="reg_username">用户名：</label>
                <div class="input-box">
                    <input type="text" 
                    id="reg_username" 
                    name="username"
                    placeholder="设置用户名最少也要6个字符,不超过15个字符" 
                    required
                    minlength="6"
                    maxlength="15">
                </div>
            </div>

            <div class="form-item">
                <label for="reg_password">密码：</label>
                <div class="input-box">
                    <input type="password" 
                    id="reg_password" 
                    name="password" 
                    placeholder="设置密码" 
                    required>
                </div>
            </div>

            <div class="form-item">
                <label>性别：</label>
                <div class="input-box radio-group">
                    <label class="inline-label">
                    <input type="radio" name="gender" value="male" checked> 男</label>
                    <label class="inline-label">
                    <input type="radio" name="gender" value="female"> 女</label>
                </div>
            </div>

            <div class="form-item">
                <label>爱好：</label>
                <div class="input-box checkbox-group">
                    <label class="inline-label"><input type="checkbox" name="hobby" value="reading"> 阅读</label>
                    <label class="inline-label"><input type="checkbox" name="hobby" value="music"> 音乐</label>
                    <label class="inline-label"><input type="checkbox" name="hobby" value="sports"> 运动</label>
                    <label class="inline-label"><input type="checkbox" name="hobby" value="game"> 游戏</label>
                </div>
            </div>

            <div class="form-item offset">
                <div class="input-box">
                    <label class="inline-label">
                        <input type="checkbox" id="agree" name="agree" required> 我已阅读并同意用户协议
                    </label>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">📤 注册</button>
                <button type="reset" class="btn-secondary">🗑️ 清空</button>
                <button type="button" class="btn-secondary">❌ 取消</button>
            </div>

        </form>

        <div class="footer-links">
            <p>已有账号？ <a href="login.html">去登录</a> | <a href="index.html">🏠 回到首页</a></p>
            <p class="copyright">&copy; 2026 ssg的学习空间</p>
        </div>
    </div>
</body>
</html>
