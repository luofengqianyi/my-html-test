<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔐 用户登录</h1>
        <form action="#" method="post">
            
            <div class="form-item">
                <label for="username">用户名：</label>
                <div class="input-box">
                    <input type="text" 
                    id="username" 
                    name="username" 
                    placeholder="请输入用户名" 
                    required>
                </div>
            </div>

            <div class="form-item">
                <label for="password">密码：</label>
                <div class="input-box">
                    <input type="password" 
                    id="password" 
                    name="password" 
                    placeholder="请输入密码" 
                    required>
                </div>
            </div>

            <div class="form-item offset">
                <div class="input-box">
                    <label class="inline-label">
                        <input type="checkbox" id="remember" name="remember"> 记住我
                    </label>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">🚀 登录</button>
            </div>

        </form>

        <div class="footer-links">
            <p>还没有账号？ <a href="register.html">去注册</a> | <a href="index.html">🏠 回到首页</a></p>
            <p class="copyright">&copy; 2026 ssg的学习空间</p>
        </div>
    </div>
</body>
</html>
