<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🔐 用户登录</h1>

    <!-- 登录表单 -->
    <form action="#" method="post">
        
        <!-- 用户名 -->
        <label for="username">用户名：</label>
        <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="请输入用户名" 
            required>
        <br><br>
        
        <!-- 密码 -->
        <label for="password">密码：</label>
        <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="请输入密码" 
            required>
        <br><br>

        <!-- 记住我 (复选框) -->
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">记住我</label>
        <br><br>

        <!-- 登录按钮 -->
        <div class="button-group">
            <button type="submit">🚀 登录</button>
        </div>


    </form>

    <hr>

    <!-- 底部导航：方便跳回注册页或首页 -->
    <p>
        还没有账号？ <a href="register.html" target="_blank">去注册</a> &nbsp;|&nbsp;
        <a href="index.html" target="_blank">🏠 回到首页</a>
    </p>

    <p>&copy; 2026 ssg的学习空间</p>

</body>
</html>
